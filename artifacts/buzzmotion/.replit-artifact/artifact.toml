kind = "web"
previewPath = "/"
title = "BuzzMotion"
version = "1.0.0"
id = "artifacts/buzzmotion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25619

[services.development]
run = "pnpm --filter @workspace/buzzmotion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/buzzmotion", "run", "build" ]
publicDir = "artifacts/buzzmotion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25619"
BASE_PATH = "/"
